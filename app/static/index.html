<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocMind — Ask Your Documents</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(247,106,138,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(106,247,200,0.04) 0%, transparent 50%);
    animation: bgShift 15s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(2%, 2%) rotate(3deg); }
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    margin-bottom: 60px;
    animation: fadeUp 0.8s ease both;
  }

  .logo-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent3);
    text-transform: uppercase;
    border: 1px solid rgba(106,247,200,0.3);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 7vw, 72px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }

  h1 span.grad {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.02em;
    line-height: 1.6;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Upload zone */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    background: var(--surface2);
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(124,106,247,0.05);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .upload-icon {
    font-size: 32px;
    margin-bottom: 12px;
    display: block;
  }

  .upload-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .upload-text strong {
    color: var(--accent);
    font-weight: 400;
  }

  .file-name {
    margin-top: 16px;
    font-size: 12px;
    color: var(--accent3);
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .file-name.visible { display: flex; }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent), #9b8af9);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 20px;
    letter-spacing: 0.05em;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(124,106,247,0.3);
  }

  .btn:active { transform: translateY(0); }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    box-shadow: 0 8px 24px rgba(124,106,247,0.15);
  }

  /* Status */
  .status {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 12px;
    display: none;
    align-items: center;
    gap: 10px;
  }

  .status.visible { display: flex; }
  .status.success { background: rgba(106,247,200,0.1); border: 1px solid rgba(106,247,200,0.2); color: var(--accent3); }
  .status.error { background: rgba(247,106,138,0.1); border: 1px solid rgba(247,106,138,0.2); color: var(--accent2); }
  .status.loading { background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.2); color: var(--accent); }

  /* Query input */
  .query-wrap {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    resize: none;
    min-height: 80px;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea::placeholder { color: var(--muted); }

  /* Answer */
  .answer-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-top: 20px;
    display: none;
    animation: fadeUp 0.4s ease both;
  }

  .answer-box.visible { display: block; }

  .answer-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .answer-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 400;
  }

  /* History */
  .history {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
  }

  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .history-item:hover { border-color: var(--accent); }
  .history-item .q { color: var(--muted); }
  .history-item .a { color: var(--text); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(124,106,247,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 40px 0 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    animation: fadeUp 1s ease 0.4s both;
  }

  footer span { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-tag">// RAG API v1.0</div>
    <h1>Doc<span class="grad">Mind</span></h1>
    <p class="subtitle">Upload a document. Ask anything.<br>Powered by LLM + vector search.</p>
  </header>

  <!-- Upload Card -->
  <div class="card">
    <div class="card-label">01 — Upload Document</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".txt,.pdf,.md">
      <span class="upload-icon">⬆</span>
      <div class="upload-text">
        <strong>Click to choose</strong> or drag & drop<br>
        Supports .txt, .md files
      </div>
    </div>
    <div class="file-name" id="fileName">
      <span>📄</span>
      <span id="fileNameText"></span>
    </div>
    <button class="btn" id="uploadBtn" onclick="uploadFile()" disabled>
      Process Document
    </button>
    <div class="status" id="uploadStatus"></div>
  </div>

  <!-- Query Card -->
  <div class="card">
    <div class="card-label">02 — Ask a Question</div>
    <div class="query-wrap">
      <textarea id="questionInput" placeholder="What is this document about?&#10;Ask anything..." rows="3"></textarea>
    </div>
    <button class="btn btn-secondary" id="queryBtn" onclick="askQuestion()">
      Ask →
    </button>
    <div class="answer-box" id="answerBox">
      <div class="answer-label">// answer</div>
      <div class="answer-text" id="answerText"></div>
    </div>

    <!-- History -->
    <div id="historyWrap" style="display:none; margin-top:24px;">
      <div class="card-label">History</div>
      <div class="history" id="history"></div>
    </div>
  </div>

  <footer>Built with FastAPI + LangChain + Groq — <span>DocMind</span></footer>
</div>

<script>
  const API = 'http://127.0.0.1:8000';
  let qHistory = [];

  // File input
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileName = document.getElementById('fileName');
  const fileNameText = document.getElementById('fileNameText');
  const uploadZone = document.getElementById('uploadZone');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileNameText.textContent = fileInput.files[0].name;
      fileName.classList.add('visible');
      uploadBtn.disabled = false;
    }
  });

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    fileInput.files = e.dataTransfer.files;
    fileInput.dispatchEvent(new Event('change'));
  });

  // Enter key to submit
  document.getElementById('questionInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askQuestion(); }
  });

  function setStatus(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `status ${type} visible`;
    el.innerHTML = type === 'loading'
      ? `<div class="spinner"></div><span>${msg}</span>`
      : `<span>${type === 'success' ? '✓' : '✗'}</span><span>${msg}</span>`;
  }

  async function uploadFile() {
    const file = fileInput.files[0];
    if (!file) return;
    uploadBtn.disabled = true;
    setStatus('uploadStatus', 'loading', 'Processing document...');
    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
      const data = await res.json();
      if (res.ok) {
        setStatus('uploadStatus', 'success', data.message);
      } else {
        setStatus('uploadStatus', 'error', 'Upload failed. Try again.');
      }
    } catch (e) {
      setStatus('uploadStatus', 'error', 'Cannot reach API. Is the server running?');
    }
    uploadBtn.disabled = false;
  }

  async function askQuestion() {
    const q = document.getElementById('questionInput').value.trim();
    if (!q) return;
    const queryBtn = document.getElementById('queryBtn');
    queryBtn.disabled = true;
    queryBtn.textContent = 'Thinking...';
    document.getElementById('answerBox').classList.remove('visible');
    try {
      const res = await fetch(`${API}/query?question=${encodeURIComponent(q)}`, { method: 'POST' });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('answerText').textContent = data.answer;
        document.getElementById('answerBox').classList.add('visible');
        addHistory(q, data.answer);
      } else {
        document.getElementById('answerText').textContent = 'Error getting answer. Make sure a document is uploaded first.';
        document.getElementById('answerBox').classList.add('visible');
      }
    } catch (e) {
      document.getElementById('answerText').textContent = 'Cannot reach API. Is the server running?';
      document.getElementById('answerBox').classList.add('visible');
    }
    queryBtn.disabled = false;
    queryBtn.textContent = 'Ask →';
  }

  function addHistory(q, a) {
    qHistory.unshift({ q, a });
    if (qHistory.length > 10) qHistory.pop();
    const wrap = document.getElementById('historyWrap');
    const container = document.getElementById('history');
    wrap.style.display = 'block';
    container.innerHTML = qHistory.map((item, i) => `
      <div class="history-item" onclick="loadHistory(${i})">
        <span class="q">Q: ${item.q}</span>
        <span class="a">A: ${item.a.substring(0, 80)}${item.a.length > 80 ? '...' : ''}</span>
      </div>
    `).join('');
  }

  function loadHistory(i) {
    document.getElementById('questionInput').value = qHistory[i].q;
    document.getElementById('answerText').textContent = qHistory[i].a;
    document.getElementById('answerBox').classList.add('visible');
  }
</script>
</body>
</html>
